{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WebBuilder</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS global -->
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/backgrounds.css' %}">
  <link rel="stylesheet" href="{% static 'css/assistant.css' %}">
  <link rel="stylesheet" href="{% static 'css/edit.css' %}">
  <link rel="stylesheet" href="{% static 'css/history.css' %}">
  

  <!-- CSS específico de cada página -->
  {% block extra_css %}{% endblock %}

</head>

<body class="{% block body_class %}{% endblock %}">

  {% include 'WebBuilder/navbar.html' %}

  <!-- Mensajes flash -->
  {% if messages %}
    <div style="position:fixed; top:1rem; right:1rem; z-index:9999;">
      {% for message in messages %}
        <div style="background:#1e293b; border:1px solid {% if message.tags == 'error' %}#ef4444{% else %}#22c55e{% endif %}; color:white; padding:.75rem 1.25rem; border-radius:8px; margin-bottom:.5rem; font-size:.9rem;">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

</body>
</html>
